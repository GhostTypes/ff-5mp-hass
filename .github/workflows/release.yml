name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # Extract changelog section (same approach as ff-5mp-api-py, with CRLF handling)
          CHANGELOG=$(tr -d '\r' < CHANGELOG.md | awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}")

          if [ -z "$CHANGELOG" ]; then
            echo "Warning: No changelog entry found for version $VERSION"
            CHANGELOG="No changelog entry found. See [CHANGELOG.md](https://github.com/GhostTypes/ff-5mp-hass/blob/main/CHANGELOG.md) for details."
          fi

          # Write changelog + installation instructions to release notes
          echo "$CHANGELOG" > release_notes.md
          {
          echo "---"
          echo ""
          echo "## Installation"
          echo ""
          echo "### Via HACS (Recommended)"
          echo "1. Open HACS -> Integrations"
          echo "2. Click the menu -> Custom repositories"
          echo '3. Add: `https://github.com/GhostTypes/ff-5mp-hass`'
          echo "4. Category: Integration"
          echo '5. Search "FlashForge" and install'
          echo ""
          echo "### Manual Installation"
          echo '1. Download `Source code (zip)` below'
          echo '2. Extract `custom_components/flashforge/` folder'
          echo '3. Copy to your Home Assistant `config/custom_components/` directory'
          echo "4. Restart Home Assistant"
          echo ""
          echo "**README**: https://github.com/GhostTypes/ff-5mp-hass/blob/v${VERSION}/README.md"
          echo "**Changelog**: https://github.com/GhostTypes/ff-5mp-hass/blob/v${VERSION}/CHANGELOG.md"
          } >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.get_version.outputs.VERSION }}"
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
